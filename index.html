<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Biglietto da visita digitale</title>
  <meta name="description" content="Biglietto da visita digitale con contatti salvabili." />
  <style>
    :root {
      --bg-1: #3b0f1b;
      --bg-2: #5c1a2d;
      --bg-3: #1f0f12;
      --card: rgba(250, 245, 236, 0.96);
      --card-border: rgba(122, 40, 61, 0.18);
      --text: #2a1a16;
      --muted: #6b5a52;
      --accent: #7a283d;
      --accent-2: #a67c52;
      --accent-soft: #efe4d3;
      --shadow: 0 24px 60px rgba(24, 8, 12, 0.28);
      --radius: 24px;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      font-family: "Segoe UI", Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(255, 220, 180, 0.10), transparent 30%),
        radial-gradient(circle at bottom right, rgba(166, 124, 82, 0.16), transparent 28%),
        linear-gradient(135deg, var(--bg-1), var(--bg-2) 55%, var(--bg-3));
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 28px;
    }

    .card {
      width: 100%;
      max-width: 470px;
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      position: relative;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0 0 auto 0;
      height: 7px;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
    }

    .hero {
      padding: 34px 30px 20px;
      text-align: center;
      position: relative;
    }

    .avatar {
      width: 104px;
      height: 104px;
      border-radius: 50%;
      margin: 0 auto 20px;
      display: block;
      object-fit: contain;
      padding: 10px;
      background: #fffdf8;
      border: 2px solid rgba(122, 40, 61, 0.16);
      box-shadow: 0 12px 24px rgba(70, 24, 36, 0.14);
    }

    h1 {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      font-size: 2rem;
      line-height: 1.15;
      color: #2b1717;
      letter-spacing: 0.01em;
    }

    .role {
      margin: 10px 0 12px;
      font-size: 0.98rem;
      color: var(--accent);
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .role span {
        display: block;
        margin-top: 4px;
        font-size: 0.92em;
        font-weight: 600;
        letter-spacing: 0.01em;
        text-transform: none;
        color: var(--muted);
    }

    .bio {
      margin: 0 auto;
      max-width: 35ch;
      color: var(--muted);
      font-size: 0.97rem;
      line-height: 1.6;
    }

    .content {
      padding: 8px 22px 26px;
    }
.section-title {
  margin: 22px 4px 14px;
  display: flex;
  align-items: center;
  gap: 12px;
  font-size: 0.78rem;
  text-transform: uppercase;
  letter-spacing: 0.18em;
  color: var(--accent);
  font-weight: 700;
}

.section-title::after {
  content: "";
  flex: 1;
  height: 1px;
  background: linear-gradient(
    90deg,
    rgba(122, 40, 61, 0.22),
    rgba(166, 124, 82, 0.10)
  );
}

.info-list {
  display: grid;
  gap: 14px;
}

.info-item {
  position: relative;
  display: grid;
  grid-template-columns: 50px 1fr;
  gap: 14px;
  align-items: center;
  padding: 16px 18px;
  border-radius: 18px;
  background: linear-gradient(180deg, #fffdf9, #faf5ee);
  border: 1px solid rgba(122, 40, 61, 0.10);
  box-shadow: 0 8px 18px rgba(55, 25, 20, 0.06);
  text-decoration: none;
  transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
  overflow: hidden;
}

.info-item::before {
  content: "";
  position: absolute;
  inset: 0 auto 0 0;
  width: 4px;
  background: linear-gradient(180deg, var(--accent), var(--accent-2));
}

.info-item:hover {
  transform: translateY(-1px);
  box-shadow: 0 12px 24px rgba(55, 25, 20, 0.10);
  border-color: rgba(122, 40, 61, 0.18);
}

.icon {
  width: 42px;
  height: 42px;
  border-radius: 50%;
  display: grid;
  place-items: center;
  background: #f3e8d8;
  color: var(--accent);
  border: 1px solid rgba(122, 40, 61, 0.10);
  flex-shrink: 0;
}

.icon svg {
  width: 18px;
  height: 18px;
  stroke: currentColor;
}

.info-text {
  min-width: 0;
}

.label {
  display: block;
  margin-bottom: 4px;
  font-size: 0.72rem;
  color: var(--accent);
  text-transform: uppercase;
  letter-spacing: 0.16em;
  font-weight: 700;
}

.value {
  color: var(--text);
  font-size: 1.02rem;
  line-height: 1.4;
  word-break: break-word;
}

.value strong,
.value a {
  color: var(--text);
  text-decoration: none;
  font-weight: 500;
}

.value a:hover {
  color: var(--accent);
}
    .actions {
      display: grid;
      gap: 12px;
      margin-top: 20px;
    }

    .btn {
      appearance: none;
      border: none;
      width: 100%;
      border-radius: 16px;
      padding: 15px 18px;
      font-size: 0.97rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.18s ease, opacity 0.18s ease, box-shadow 0.18s ease;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .btn:hover {
      transform: translateY(-1px);
      opacity: 0.98;
    }

    .btn-primary {
      color: #fffaf5;
      background: linear-gradient(135deg, #6b2033, var(--accent));
      box-shadow: 0 12px 26px rgba(122, 40, 61, 0.20);
    }

    .btn-secondary {
      color: #2f2115;
      background:  #d8c0a0;
      box-shadow: 0 12px 26px rgba(166, 124, 82, 0.20);
    }

    .btn-outline {
      color: var(--accent);
      background: transparent;
      border: 1px solid rgba(122, 40, 61, 0.20);
    }

    .socials {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 18px;
    }

    .socials a {
      text-decoration: none;
      color: var(--accent);
      padding: 10px 14px;
      border-radius: 999px;
      background: #fffaf4;
      border: 1px solid rgba(122, 40, 61, 0.12);
      font-size: 0.92rem;
      font-weight: 600;
    }

    .footer-note {
      text-align: center;
      margin-top: 16px;
      color: var(--muted);
      font-size: 0.84rem;
      font-style: italic;
    }

@media (max-width: 480px) {
  body {
    padding: 16px;
  }

  .card {
    border-radius: 20px;
  }

  .hero {
    padding: 26px 18px 16px;
  }

  .content {
    padding: 8px 14px 18px;
  }

  .avatar {
    width: 90px;
    height: 90px;
  }

  h1 {
    font-size: 1.65rem;
    line-height: 1.18;
  }

  .role {
    font-size: 0.9rem;
    line-height: 1.35;
    letter-spacing: 0.02em;
    max-width: 24ch;
    margin-left: auto;
    margin-right: auto;
  }

  .section-title {
    font-size: 0.72rem;
    letter-spacing: 0.12em;
    margin: 18px 2px 10px;
  }

  .info-list {
    gap: 10px;
  }

  .info-item {
    grid-template-columns: 40px 1fr;
    gap: 10px;
    padding: 13px 14px;
    border-radius: 16px;
  }

  .icon {
    width: 34px;
    height: 34px;
  }

  .icon svg {
    width: 16px;
    height: 16px;
  }

  .label {
    font-size: 0.68rem;
    letter-spacing: 0.12em;
  }

  .value {
    font-size: 0.95rem;
    line-height: 1.35;
    overflow-wrap: anywhere;
    word-break: break-word;
  }

  .btn {
    padding: 13px 14px;
    font-size: 0.92rem;
  }

  .socials {
    gap: 8px;
  }

  .socials a {
    padding: 8px 12px;
    font-size: 0.86rem;
  }
}

@media (max-width: 360px) {
  body {
    padding: 10px;
  }

  .hero {
    padding: 22px 14px 14px;
  }

  .content {
    padding: 8px 10px 14px;
  }

  h1 {
    font-size: 1.5rem;
  }

  .role {
    font-size: 0.84rem;
    max-width: 22ch;
  }

  .info-item {
    grid-template-columns: 36px 1fr;
    gap: 8px;
    padding: 12px 12px;
  }

  .icon {
    width: 30px;
    height: 30px;
  }

  .icon svg {
    width: 14px;
    height: 14px;
  }

  .value {
    font-size: 0.9rem;
  }
}
  </style>
</head>
<body>
  <main class="card">
    <section class="hero">
      <img class="avatar" src="assets/logo_azienda.jpg" alt="Logo aziendale" />
      <h1>Sabino Guerriero</h1>
      <p class="role">
        Direttore commerciale Italia 
        <br>Vinosia di Luciano Ercolino</p>
    </section>

    <section class="content">
      <div class="section-title">Contatti</div>

<div class="info-list">
  <a class="info-item" href="mailto:sabino.guerriero@vinosia.it">
    <div class="icon" aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8">
        <path d="M4 6h16v12H4z"></path>
        <path d="M4 7l8 6 8-6"></path>
      </svg>
    </div>
    <div class="info-text">
      <span class="label">Email</span>
      <div class="value">sabino.guerriero@vinosia.it</div>
    </div>
  </a>

  <a class="info-item" href="tel:+393382325055">
    <div class="icon" aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8">
        <path d="M6.5 4.5h3l1.5 4-2 1.5a15 15 0 0 0 5 5l1.5-2 4 1.5v3a2 2 0 0 1-2.2 2A17.5 17.5 0 0 1 4.5 6.7 2 2 0 0 1 6.5 4.5z"></path>
      </svg>
    </div>
    <div class="info-text">
      <span class="label">Telefono</span>
      <div class="value">+39 338 232 5055</div>
    </div>
  </a>

  <a class="info-item" href="https://vinosia.it" target="_blank" rel="noopener noreferrer">
    <div class="icon" aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8">
        <circle cx="12" cy="12" r="9"></circle>
        <path d="M3 12h18"></path>
        <path d="M12 3a15 15 0 0 1 0 18"></path>
        <path d="M12 3a15 15 0 0 0 0 18"></path>
      </svg>
    </div>
    <div class="info-text">
      <span class="label">Sito aziendale</span>
      <div class="value">vinosia.it</div>
    </div>
  </a>
</div>

      <div class="actions">
        <button class="btn btn-primary" id="saveContactBtn">Salva contatto</button>
        <a class="btn btn-secondary" href="mailto:sabino.guerriero@vinosia.it?subject=Contatto%20dal%20biglietto%20digitale">Mandami una mail</a>
      </div>

      <div class="socials">
        <a href="https://www.facebook.com/profile.php?id=100006419201562&locale=it_IT" target="_blank" rel="noopener noreferrer">Facebook</a>
        <a href="https://www.instagram.com/sabinoguerriero" target="_blank" rel="noopener noreferrer">Instagram</a>
      </div>
    </section>
  </main>

  <script>
    const contact = {
      firstName: 'Sabino',
      lastName: 'Guerriero',
      fullName: 'Sabino Guerriero',
      organization: 'Vinosia',
      title: 'Direttore commerciale Italia',
      phone: '+39 338 2325055',
      email: 'sabino.guerriero@vinosia.it',
      website: 'https://vinosia.it'
    };

    function buildVCard(data) {
      return [
        'BEGIN:VCARD',
        'VERSION:3.0',
        `N:${data.lastName};${data.firstName};;;`,
        `FN:${data.fullName}`,
        `ORG:${data.organization}`,
        `TITLE:${data.title}`,
        `TEL;TYPE=CELL:${data.phone}`,
        `EMAIL;TYPE=INTERNET:${data.email}`,
        `URL:${data.website}`,
        'END:VCARD'
      ].join('\n');
    }

    document.getElementById('saveContactBtn').addEventListener('click', () => {
      const vcard = buildVCard(contact);
      const blob = new Blob([vcard], { type: 'text/vcard;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'sabino-guerriero.vcf';
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    });
  </script>
</body>
</html>
